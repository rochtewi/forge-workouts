name: Daily Workout Notification

on:
  schedule:
    # Runs hourly; the sender script delivers to each phone only at the hour
    # that phone picked in the app (legacy entries default to 7 AM Eastern).
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Send to every phone now, ignoring their chosen hour (for testing)'
        type: boolean
        default: false

permissions: {}

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-save --no-audit --no-fund web-push@3
      - run: node scripts/send-push.mjs
        env:
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          PUSH_SUBSCRIPTION: ${{ secrets.PUSH_SUBSCRIPTION }}
          FORCE: ${{ inputs.force }}
